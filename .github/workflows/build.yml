name: Build Executable

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Compile EXE using PyInstaller
      run: |
        pyinstaller --onefile --noconsole --name="ImageToPDF" --icon=app.ico --add-data "app.ico;." app_gui.py

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ImageToPDF-Executable
        path: dist/ImageToPDF.exe

    - name: Release Compiled Executable
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: dist/ImageToPDF.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
